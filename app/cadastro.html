<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — Acessor Digital</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../tokens/acessor-tokens.css">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      background: var(--bg-pure);
      color: var(--text-main);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 2rem 0;
    }

    .bg-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.15) 0%, transparent 60%);
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      padding: 2rem;
      animation: fadeUp 0.6s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header { text-align: center; margin-bottom: 2.5rem; }
    
    .logo-container {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 800;
      color: #FFF;
      text-decoration: none;
      margin-bottom: 2rem;
      letter-spacing: -0.03em;
    }
    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-primary-hover));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px rgba(124, 58, 237, 0.4);
    }
    .logo-icon svg { width: 20px; height: 20px; fill: #111; }

    .header h1 {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    .header p { color: var(--text-muted); font-size: 1rem; }

    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 2.5rem;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255, 255, 255, 0.05);
    }

    .form-group { margin-bottom: 1.2rem; }
    .form-group.grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .form-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .form-control {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-main);
      padding: 0.8rem 1rem;
      border-radius: 10px;
      font-size: 1rem;
      font-family: var(--font-body);
      transition: all 0.3s;
      outline: none;
    }
    .form-control:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
    }
    .form-control::placeholder { color: rgba(255, 255, 255, 0.2); }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-primary-hover));
      color: #000;
      border: none;
      padding: 0.9rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
      margin-top: 2rem;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4);
    }

    .footer {
      text-align: center;
      margin-top: 2rem;
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    .footer a {
      color: var(--accent-primary);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.3s;
    }
    .footer a:hover { opacity: 0.8; text-decoration: underline; }
  </style>
</head>
<body>

  <div class="bg-glow"></div>

  <div class="container">
    <div class="header">
      <a href="../index.html" class="logo-container">
        <div style="font-family: var(--font-display); font-size: 1.8rem; font-weight: 800; letter-spacing: -0.05em; color: #FFF; display: flex; align-items: baseline; text-decoration: none;">acessor<span style="color: var(--accent-coral); margin-left: 2px; text-shadow: 0 0 10px rgba(255, 94, 58, 0.5);">.</span></div>
      </a>
      <h1>Comece agora</h1>
      <p>Configure seu atendente IA em menos de 5 minutos</p>
    </div>

    <div class="glass-card">
      <form id="signupForm">
        <div class="form-group grid-2">
          <div>
            <label>Nome</label>
            <input type="text" class="form-control" placeholder="Seu nome" required>
          </div>
          <div>
            <label>Sobrenome</label>
            <input type="text" class="form-control" placeholder="Seu sobrenome" required>
          </div>
        </div>
        
        <div class="form-group">
          <label>Nome da Empresa</label>
          <input type="text" class="form-control" placeholder="Minha Loja S/A" required>
        </div>

        <div class="form-group">
          <label>WhatsApp Comercial</label>
          <input type="tel" class="form-control" placeholder="(00) 00000-0000" required>
        </div>

        <div class="form-group">
          <label>E-mail Corporativo</label>
          <input type="email" id="signupEmail" class="form-control" placeholder="contato@empresa.com.br" required>
        </div>
        
        <div class="form-group">
          <label>Crie sua senha</label>
          <input type="password" id="signupPassword" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-primary">
          Criar minha conta grátis
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </button>
      </form>
    </div>

    <div class="footer">
      Já possui uma conta? <a href="login">Fazer login</a>
    </div>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value.trim();
      
      // Salvar em localStorage
      localStorage.setItem('registered_email', email);
      localStorage.setItem('registered_password', password);
      
      // Ir para o dashboard
      window.location.href = 'dashboard.html';
    });
  </script>

</body>
</html>
