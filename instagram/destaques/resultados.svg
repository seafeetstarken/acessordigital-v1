<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1F"/>
      <stop offset="100%" stop-color="#0F0F12"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="96" stroke="url(#purple)" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Bar 1 (short) -->
  <rect x="50" y="108" width="22" height="36" rx="5" fill="url(#purple)" opacity="0.3"/>
  <rect x="50" y="108" width="22" height="36" rx="5" stroke="url(#purple)" stroke-width="2"/>

  <!-- Bar 2 (medium) -->
  <rect x="80" y="88" width="22" height="56" rx="5" fill="url(#purple)" opacity="0.3"/>
  <rect x="80" y="88" width="22" height="56" rx="5" stroke="url(#purple)" stroke-width="2"/>

  <!-- Bar 3 (tall) -->
  <rect x="110" y="64" width="22" height="80" rx="5" fill="url(#purple)" opacity="0.3"/>
  <rect x="110" y="64" width="22" height="80" rx="5" stroke="url(#purple)" stroke-width="2"/>

  <!-- Arrow up -->
  <line x1="121" y1="58" x2="148" y2="44" stroke="url(#green)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <polyline points="138,40 148,44 144,54" stroke="url(#green)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>

  <!-- Baseline -->
  <line x1="46" y1="148" x2="154" y2="148" stroke="url(#purple)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>
