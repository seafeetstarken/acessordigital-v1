<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1F"/>
      <stop offset="100%" stop-color="#0F0F12"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="96" stroke="url(#purple)" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Diamond shape -->
  <path d="M100 52 L138 90 L100 148 L62 90 Z"
        fill="url(#purple)" opacity="0.12"/>
  <path d="M100 52 L138 90 L100 148 L62 90 Z"
        stroke="url(#purple)" stroke-width="2" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Diamond horizontal divider -->
  <line x1="62" y1="90" x2="138" y2="90" stroke="url(#purple)" stroke-width="1.5" opacity="0.6"/>

  <!-- Diamond facet lines -->
  <line x1="100" y1="52" x2="80" y2="90" stroke="url(#purple)" stroke-width="1" opacity="0.4"/>
  <line x1="100" y1="52" x2="120" y2="90" stroke="url(#purple)" stroke-width="1" opacity="0.4"/>

  <!-- Green spark inside -->
  <circle cx="100" cy="90" r="7" fill="url(#green)" filter="url(#glow)"/>

  <!-- Small decorative dots -->
  <circle cx="100" cy="58" r="2.5" fill="url(#purple)" opacity="0.7"/>
  <circle cx="131" cy="93" r="2" fill="url(#purple)" opacity="0.5"/>
  <circle cx="69" cy="93" r="2" fill="url(#purple)" opacity="0.5"/>
</svg>
