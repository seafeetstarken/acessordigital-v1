<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1F"/>
      <stop offset="100%" stop-color="#0F0F12"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="96" stroke="url(#purple)" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Brain outline -->
  <!-- Left lobe -->
  <path d="M100 72 C100 72 88 62 76 66 C64 70 58 80 60 90 C58 96 56 106 62 114 C66 120 74 122 80 120 C82 128 88 134 96 134 L100 134"
        stroke="url(#purple)" stroke-width="2.5" stroke-linecap="round" fill="none" filter="url(#glow)"/>
  <!-- Right lobe -->
  <path d="M100 72 C100 72 112 62 124 66 C136 70 142 80 140 90 C142 96 144 106 138 114 C134 120 126 122 120 120 C118 128 112 134 104 134 L100 134"
        stroke="url(#purple)" stroke-width="2.5" stroke-linecap="round" fill="none" filter="url(#glow)"/>
  <!-- Center line -->
  <line x1="100" y1="72" x2="100" y2="134" stroke="url(#purple)" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- Neural pulse dots (green) -->
  <circle cx="78" cy="88" r="4" fill="url(#green)" filter="url(#glow)"/>
  <circle cx="88" cy="108" r="3" fill="url(#green)" opacity="0.8" filter="url(#glow)"/>
  <circle cx="122" cy="88" r="4" fill="url(#green)" filter="url(#glow)"/>
  <circle cx="112" cy="108" r="3" fill="url(#green)" opacity="0.8" filter="url(#glow)"/>
  <circle cx="100" cy="96" r="4.5" fill="url(#green)" filter="url(#glow)"/>

  <!-- Connections -->
  <line x1="78" y1="88" x2="100" y2="96" stroke="url(#green)" stroke-width="1" opacity="0.5"/>
  <line x1="122" y1="88" x2="100" y2="96" stroke="url(#green)" stroke-width="1" opacity="0.5"/>
  <line x1="88" y1="108" x2="100" y2="96" stroke="url(#green)" stroke-width="1" opacity="0.5"/>
  <line x1="112" y1="108" x2="100" y2="96" stroke="url(#green)" stroke-width="1" opacity="0.5"/>
</svg>
