<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acessor Digital — Destaques Instagram</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0F0F12;
      color: #FAFAFA;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      min-height: 100vh;
      padding: 3rem 2rem;
    }
    h1 {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: #A78BFA;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    .subtitle {
      text-align: center;
      color: #71717A;
      font-size: 0.875rem;
      margin-bottom: 3rem;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2.5rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    /* Circular clip like Instagram */
    .circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid transparent;
      background: linear-gradient(#0F0F12, #0F0F12) padding-box,
                  linear-gradient(135deg, #8B5CF6, #22C55E) border-box;
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }

    .circle:hover {
      transform: scale(1.08);
      box-shadow: 0 0 30px rgba(139,92,246,0.4);
    }

    .circle img, .circle object {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #A78BFA;
      text-align: center;
    }

    /* Also show large preview below */
    .preview-section {
      max-width: 900px;
      margin: 4rem auto 0;
      padding-top: 3rem;
      border-top: 1px solid #2E2E35;
    }

    .preview-section h2 {
      font-size: 1rem;
      color: #71717A;
      margin-bottom: 2rem;
      text-align: center;
    }

    .large-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.5rem;
    }

    .large-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .large-item img, .large-item object {
      width: 180px;
      height: 180px;
      border-radius: 32px;
      border: 2px solid #2E2E35;
    }

    .large-item .label {
      font-size: 0.85rem;
      color: #71717A;
    }

    .file-link {
      font-size: 0.7rem;
      color: #3B82F6;
      text-decoration: none;
    }
    .file-link:hover { color: #60A5FA; }
  </style>
</head>
<body>

  <h1>Acessor Digital</h1>
  <p class="subtitle">Destaques do Instagram — preview como aparece no perfil</p>

  <!-- Instagram-style circular preview -->
  <div class="grid">
    <div class="item">
      <div class="circle"><img src="resultados.svg" alt="Resultados"></div>
      <span class="label">Resultados</span>
    </div>
    <div class="item">
      <div class="circle"><img src="ia.svg" alt="IA"></div>
      <span class="label">IA</span>
    </div>
    <div class="item">
      <div class="circle"><img src="planos.svg" alt="Planos"></div>
      <span class="label">Planos</span>
    </div>
    <div class="item">
      <div class="circle"><img src="clientes.svg" alt="Clientes"></div>
      <span class="label">Clientes</span>
    </div>
    <div class="item">
      <div class="circle"><img src="trafego.svg" alt="Tráfego"></div>
      <span class="label">Tráfego</span>
    </div>
    <div class="item">
      <div class="circle"><img src="faq.svg" alt="FAQ"></div>
      <span class="label">FAQ</span>
    </div>
  </div>

  <!-- Large square preview -->
  <div class="preview-section">
    <h2>Visualização maior (clique para abrir o SVG)</h2>
    <div class="large-grid">
      <div class="large-item">
        <img src="resultados.svg" alt="Resultados">
        <span class="label">Resultados</span>
        <a href="resultados.svg" class="file-link">resultados.svg</a>
      </div>
      <div class="large-item">
        <img src="ia.svg" alt="IA">
        <span class="label">IA</span>
        <a href="ia.svg" class="file-link">ia.svg</a>
      </div>
      <div class="large-item">
        <img src="planos.svg" alt="Planos">
        <span class="label">Planos</span>
        <a href="planos.svg" class="file-link">planos.svg</a>
      </div>
      <div class="large-item">
        <img src="clientes.svg" alt="Clientes">
        <span class="label">Clientes</span>
        <a href="clientes.svg" class="file-link">clientes.svg</a>
      </div>
      <div class="large-item">
        <img src="trafego.svg" alt="Tráfego">
        <span class="label">Tráfego</span>
        <a href="trafego.svg" class="file-link">trafego.svg</a>
      </div>
      <div class="large-item">
        <img src="faq.svg" alt="FAQ">
        <span class="label">FAQ</span>
        <a href="faq.svg" class="file-link">faq.svg</a>
      </div>
    </div>
  </div>

</body>
</html>
