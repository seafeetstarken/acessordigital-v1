<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1F"/>
      <stop offset="100%" stop-color="#0F0F12"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="96" stroke="url(#purple)" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Trophy cup body -->
  <path d="M72 58 L128 58 L120 104 Q118 114 100 116 Q82 114 80 104 Z"
        fill="url(#purple)" opacity="0.15"/>
  <path d="M72 58 L128 58 L120 104 Q118 114 100 116 Q82 114 80 104 Z"
        stroke="url(#purple)" stroke-width="2.5" stroke-linejoin="round" fill="none" filter="url(#glow)"/>

  <!-- Trophy stem -->
  <line x1="100" y1="116" x2="100" y2="134" stroke="url(#purple)" stroke-width="3" stroke-linecap="round"/>
  <!-- Trophy base -->
  <line x1="80" y1="134" x2="120" y2="134" stroke="url(#purple)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Left handle -->
  <path d="M72 58 Q56 58 56 74 Q56 88 72 88" stroke="url(#purple)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Right handle -->
  <path d="M128 58 Q144 58 144 74 Q144 88 128 88" stroke="url(#purple)" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Star inside (green) -->
  <path d="M100 70 L103.5 80 L114 80 L105.5 86 L108.5 96 L100 90 L91.5 96 L94.5 86 L86 80 L96.5 80 Z"
        fill="url(#green)" filter="url(#glow)"/>
</svg>
