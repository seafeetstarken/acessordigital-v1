<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Acessor Digital - PNGs Finais</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body { background: #18181B; color: white; font-family: 'Inter', sans-serif; text-align: center; padding: 40px; }
  h2 { font-family: 'Space Grotesk', sans-serif; margin-bottom: 5px; }
  p { color: #A1A1AA; margin-bottom: 30px; }
  img { box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 8px; max-width: 100%; display: block; margin: 0 auto 40px; }
  .instructions { color: #4ADE80; font-weight: bold; font-size: 18px; margin-bottom: 20px; }
</style>
</head>
<body>
  <h2>As suas imagens em PNG oficiais estão prontas abaixo!</h2>
  <p>Como os navegadores bloqueiam downloads múltiplos, coloquei as imagens diretamente aqui na tela para você.</p>
  <div class="instructions">👉 Clique com o botão direito na imagem e escolha "Salvar imagem como..."</div>
  
  <div id="container"></div>

  <script>
    async function init() {
      await document.fonts.ready;
      
      const container = document.getElementById('container');

      // --- 1. GERAR PERFIL (1080x1080) ---
      const c1 = document.createElement('canvas');
      c1.width = 1080; c1.height = 1080;
      const ctx1 = c1.getContext('2d');
      
      ctx1.fillStyle = '#0A0A0C';
      ctx1.fillRect(0, 0, 1080, 1080);
      
      ctx1.font = "bold 650px 'Space Grotesk'";
      ctx1.textAlign = "center";
      ctx1.textBaseline = "middle";
      
      const cx = 540;
      const cy = 570; 
      
      ctx1.fillStyle = '#FFFFFF';
      ctx1.fillText("a", cx - 60, cy);
      
      const m1 = ctx1.measureText("a");
      ctx1.fillStyle = '#FF5E3A';
      ctx1.fillText(".", cx + m1.width/2 - 20, cy);

      const imgPerfil = new Image();
      imgPerfil.src = c1.toDataURL('image/png');
      imgPerfil.style.width = "400px"; // Visualização menor na tela
      
      const h3Perfil = document.createElement('h3');
      h3Perfil.innerText = "1. Perfil (1080x1080)";
      container.appendChild(h3Perfil);
      container.appendChild(imgPerfil);

      // --- 2. GERAR CAPA (820x312) ---
      const c2 = document.createElement('canvas');
      c2.width = 1640; c2.height = 624; // 2x Retina Resolution
      const ctx2 = c2.getContext('2d');
      ctx2.scale(2, 2);
      
      ctx2.fillStyle = '#0A0A0C';
      ctx2.fillRect(0, 0, 820, 312);
      
      const grad = ctx2.createRadialGradient(820*0.75, 312*0.5, 0, 820*0.75, 312*0.5, 400);
      grad.addColorStop(0, 'rgba(124, 58, 237, 0.25)');
      grad.addColorStop(1, 'rgba(10, 10, 12, 0)');
      ctx2.fillStyle = grad;
      ctx2.fillRect(0, 0, 820, 312);

      const leftX = 60;

      ctx2.font = "bold 44px 'Space Grotesk'";
      ctx2.textAlign = "left";
      ctx2.textBaseline = "top";
      ctx2.fillStyle = '#FFFFFF';
      ctx2.fillText("acessor", leftX, 70);
      const mLogo = ctx2.measureText("acessor");
      ctx2.fillStyle = '#FF5E3A';
      ctx2.fillText(".", leftX + mLogo.width + 2, 70);

      ctx2.font = "bold 40px 'Space Grotesk'";
      ctx2.fillStyle = '#FFFFFF';
      ctx2.fillText("A revolução", leftX, 135);
      ctx2.fillText("do acesso.", leftX, 180);

      ctx2.font = "18px 'Inter'";
      ctx2.fillStyle = '#FF5E3A';
      ctx2.fillText("//", leftX, 240);
      const mSlash = ctx2.measureText("// ");
      ctx2.fillStyle = '#A1A1AA';
      ctx2.fillText("Consciência artificial em vendas para o seu negócio.", leftX + mSlash.width + 5, 240);

      const imgCapa = new Image();
      imgCapa.src = c2.toDataURL('image/png');
      imgCapa.style.width = "820px"; // Visualização na tela
      
      const h3Capa = document.createElement('h3');
      h3Capa.innerText = "2. Capa (820x312)";
      container.appendChild(h3Capa);
      container.appendChild(imgCapa);
    }
    
    setTimeout(init, 500);
  </script>
</body>
</html>
