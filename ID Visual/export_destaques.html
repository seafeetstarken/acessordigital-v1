<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Acessor Digital - Destaques (Highlights)</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
  body { background: #18181B; color: white; font-family: sans-serif; text-align: center; padding: 40px; }
  h2 { font-family: 'Space Grotesk', sans-serif; margin-bottom: 5px; }
  p { color: #A1A1AA; margin-bottom: 30px; }
  .grid { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
  .highlight-card { background: #0A0A0C; padding: 20px; border-radius: 16px; border: 1px solid #27272A; }
  img { border-radius: 50%; border: 2px solid #3F3F46; width: 180px; height: 180px; display: block; margin-bottom: 15px; }
  h3 { margin: 0; font-size: 16px; color: #FFFFFF; font-family: 'Space Grotesk', sans-serif;}
  .instructions { color: #4ADE80; font-weight: bold; font-size: 18px; margin-bottom: 30px; }
</style>
</head>
<body>
  <h2>Capas para os 5 Destaques (Instagram)</h2>
  <p>Mantendo o padrão do logotipo principal (Texto Branco + Ponto Coral/Violeta).</p>
  <div class="instructions">👉 Clique com o botão direito nas imagens redondas e "Salvar imagem como..."</div>
  
  <div class="grid" id="container"></div>

  <script>
    const highlights = [
      { id: "ia", title: "1. A Inteligência", text: "IA", dotColor: "#7C3AED" }, // Violet Dot
      { id: "roi", title: "2. Resultados", text: "ROI", dotColor: "#FF5E3A" }, // Coral Dot
      { id: "pro", title: "3. Os Planos", text: "PRO", dotColor: "#7C3AED" }, // Violet Dot
      { id: "faq", title: "4. Dúvidas (FAQ)", text: "FAQ", dotColor: "#FF5E3A" }, // Coral Dot
      { id: "app", title: "5. O Sistema", text: "APP", dotColor: "#7C3AED" } // Violet Dot
    ];

    async function init() {
      await document.fonts.ready;
      const container = document.getElementById('container');

      highlights.forEach(h => {
        const c = document.createElement('canvas');
        c.width = 1080; c.height = 1080;
        const ctx = c.getContext('2d');
        
        // Fundo
        ctx.fillStyle = '#0A0A0C';
        ctx.fillRect(0, 0, 1080, 1080);
        
        // Configuração do Texto
        ctx.font = "bold 350px 'Space Grotesk'";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        
        const cx = 540;
        const cy = 570; // Ajuste fino da baseline
        
        // Medir o texto para colar o ponto corretamente
        const mText = ctx.measureText(h.text);
        const dotOffset = (mText.width / 2) + 15; // Distância do ponto

        // Desenhar o Texto (Branco)
        ctx.fillStyle = '#FFFFFF';
        ctx.fillText(h.text, cx - 40, cy); 
        
        // Desenhar o Ponto (Coral ou Violeta)
        ctx.fillStyle = h.dotColor;
        ctx.shadowColor = h.dotColor;
        ctx.shadowBlur = 40; // Brilho no ponto
        ctx.fillText(".", cx - 40 + dotOffset, cy);
        ctx.shadowBlur = 0; // Reset

        // Renderizar na tela
        const card = document.createElement('div');
        card.className = "highlight-card";
        
        const img = new Image();
        img.src = c.toDataURL('image/png');
        
        const h3 = document.createElement('h3');
        h3.innerText = h.title;

        card.appendChild(img);
        card.appendChild(h3);
        container.appendChild(card);
      });
    }
    
    setTimeout(init, 500);
  </script>
</body>
</html>
