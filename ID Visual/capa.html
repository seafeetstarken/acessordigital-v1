<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 820px; height: 312px; background: #0A0A0C; overflow: hidden; font-family: 'Inter', sans-serif; }
        .capa-bg {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 75% 50%, rgba(124, 58, 237, 0.2) 0%, rgba(10, 10, 12, 0) 50%);
            z-index: 1;
        }
        .capa-content {
            position: relative; z-index: 2; padding: 30px 60px; display: flex; flex-direction: column; gap: 16px; height: 100%; box-sizing: border-box; justify-content: center;
        }
        .capa-logo { display: flex; align-items: center; }
        .capa-logo svg { height: 48px; }
        .capa-title {
            font-family: 'Space Grotesk', sans-serif; font-size: 42px; font-weight: 700; color: #FFFFFF; line-height: 1.1; margin: 0;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .capa-subtitle { font-size: 20px; color: #A1A1AA; margin: 0; }
        .capa-accent { color: #FF5E3A; }
    </style>
</head>
<body>
    <div class="capa-bg"></div>
    <div class="capa-content">
        <div class="capa-logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
              <defs>
                <linearGradient id="purpleGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#A78BFA"/>
                  <stop offset="100%" stop-color="#8B5CF6"/>
                </linearGradient>
                <linearGradient id="sparkGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#4ADE80"/>
                  <stop offset="100%" stop-color="#22C55E"/>
                </linearGradient>
              </defs>
              <g transform="translate(0, 20)">
                <rect x="0" y="0" width="80" height="68" rx="18" ry="18" fill="url(#purpleGrad2)"/>
                <path d="M 14 68 L 8 88 L 32 68" fill="url(#purpleGrad2)"/>
                <path d="M 48 18 L 32 42 L 42 42 L 34 62 L 56 34 L 46 34 Z" fill="url(#sparkGrad2)"/>
              </g>
              <text x="100" y="72" font-family="'Inter', sans-serif" font-size="44" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">Acessor</text>
              <text x="280" y="72" font-family="'Inter', sans-serif" font-size="44" font-weight="400" fill="#A1A1AA" letter-spacing="-0.5">Digital</text>
            </svg>
        </div>
        <h1 class="capa-title">O fim das mensagens<br>acumuladas no WhatsApp.</h1>
        <p class="capa-subtitle"><span class="capa-accent">//</span> Consciência artificial em vendas para o seu negócio.</p>
    </div>
</body>
</html>
